name: Build Release
on:
  push:
    tags:
      - "v*"
      - "pr*"
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout UnboundBank
        uses: actions/checkout@v4
        with:
          path: unboundbank

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: unboundbank
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        working-directory: unboundbank
        run: pyinstaller unboundbank.spec

      - name: Package release zip
        shell: pwsh
        run: |
          New-Item -ItemType Directory release
          Copy-Item -Recurse unboundbank/dist/UnboundBank/* release/
          Copy-Item unboundbank/README.md release/
          Compress-Archive -Path release/* -DestinationPath "UnboundBank-${{ github.ref_name }}-windows.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "UnboundBank ${{ github.ref_name }}"
          body: |
            ## UnboundBank ${{ github.ref_name }}
            ### Quick start
            1. Download `UnboundBank-${{ github.ref_name }}-windows.zip` below
            2. Extract it anywhere
            3. Double-click `UnboundBank.exe`
            4. Click **Start Unbound Bank** and drag in your `.sav` file
            
            Everything is bundled — no Python, no installs, nothing else needed.
            
            ---
            *Game data originally sourced from [PUSE](https://github.com/Zannael/PUSE) (MIT) and [Dynamic-Pokemon-Expansion](https://github.com/Skeli789/Dynamic-Pokemon-Expansion) (WTFPL).*
          files: UnboundBank-${{ github.ref_name }}-windows.zip
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'pr') }}
